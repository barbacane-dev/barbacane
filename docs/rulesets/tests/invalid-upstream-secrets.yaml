openapi: "3.1.0"
info:
  title: Invalid Upstream and Secrets Spec
  version: "1.0.0"
  description: Tests upstream URL and secret reference rules.

servers:
  - url: https://api.example.com

paths:
  /plaintext:
    get:
      operationId: plaintextUpstream
      summary: Plaintext HTTP upstream
      description: Uses http instead of https.
      tags: [test]
      x-barbacane-dispatch:
        name: http-upstream
        config:
          url: "http://insecure.example.com"
      responses:
        "200":
          description: OK

  /bad-secret-ref:
    get:
      operationId: badSecretRef
      summary: Malformed secret reference
      description: Uses invalid env reference format.
      tags: [test]
      x-barbacane-dispatch:
        name: s3
        config:
          access_key_id: "env://"
          secret_access_key: "env://VALID_SECRET"
          region: "us-east-1"
      responses:
        "200":
          description: OK

  /bad-file-ref:
    get:
      operationId: badFileRef
      summary: Malformed file reference
      description: Uses relative file path.
      tags: [test]
      x-barbacane-dispatch:
        name: s3
        config:
          access_key_id: "file://relative/path"
          secret_access_key: "file:///run/secrets/key"
          region: "us-east-1"
      responses:
        "200":
          description: OK
