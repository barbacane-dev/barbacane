documentationUrl: https://docs.barbacane.dev/guide/vacuum.html

# NOTE: Rules target OpenAPI specs only ($.paths[*][*] for operations).
# Vacuum does not yet support AsyncAPI 3.x. When it does, add
# $.operations[*] paths alongside $.paths[*][*] to cover AsyncAPI operations.

rules:
  # ---------------------------------------------------------------------------
  # Dispatch validation
  # ---------------------------------------------------------------------------

  barbacane-dispatch-required:
    description: Every operation must declare an x-barbacane-dispatch block.
    documentationUrl: https://docs.barbacane.dev/reference/extensions.html#x-barbacane-dispatch
    severity: error
    given: "$.paths[*][*]"
    then:
      field: x-barbacane-dispatch
      function: truthy

  barbacane-dispatch-has-name:
    description: x-barbacane-dispatch must include a "name" field.
    documentationUrl: https://docs.barbacane.dev/reference/extensions.html#x-barbacane-dispatch
    severity: error
    given: "$.paths[*][*]['x-barbacane-dispatch']"
    then:
      field: name
      function: truthy

  barbacane-dispatch-known-plugin:
    description: "Dispatcher plugin must be one of: ai-proxy, fire-and-forget, http-upstream, kafka, lambda, mock, nats, s3, ws-upstream."
    documentationUrl: https://docs.barbacane.dev/guide/dispatchers.html
    severity: error
    given: "$.paths[*][*]['x-barbacane-dispatch'].name"
    then:
      function: enumeration
      functionOptions:
        values:
          - ai-proxy
          - fire-and-forget
          - http-upstream
          - kafka
          - lambda
          - mock
          - nats
          - s3
          - ws-upstream

  barbacane-dispatch-has-config:
    description: x-barbacane-dispatch must include a "config" object.
    documentationUrl: https://docs.barbacane.dev/reference/extensions.html#x-barbacane-dispatch
    severity: error
    given: "$.paths[*][*]['x-barbacane-dispatch']"
    then:
      field: config
      function: truthy

  barbacane-dispatch-config-valid:
    description: Dispatch config must validate against the plugin's JSON Schema.
    documentationUrl: https://docs.barbacane.dev/guide/dispatchers.html
    severity: error
    given: "$.paths[*][*]['x-barbacane-dispatch']"
    then:
      function: barbacane-validate-dispatch-config

  # ---------------------------------------------------------------------------
  # Middleware validation
  # ---------------------------------------------------------------------------

  barbacane-middleware-has-name:
    description: Each middleware entry must include a "name" field.
    documentationUrl: https://docs.barbacane.dev/reference/extensions.html#x-barbacane-middlewares
    severity: error
    given: "$['x-barbacane-middlewares'][*]"
    then:
      field: name
      function: truthy

  barbacane-middleware-known-plugin:
    description: Middleware name must be a known Barbacane middleware plugin.
    documentationUrl: https://docs.barbacane.dev/guide/middlewares/
    severity: warn
    given: "$['x-barbacane-middlewares'][*].name"
    then:
      function: enumeration
      functionOptions:
        values:
          - acl
          - ai-cost-tracker
          - ai-prompt-guard
          - ai-response-guard
          - ai-token-limit
          - apikey-auth
          - basic-auth
          - bot-detection
          - cache
          - cel
          - correlation-id
          - cors
          - http-log
          - ip-restriction
          - jwt-auth
          - oauth2-auth
          - observability
          - oidc-auth
          - opa-authz
          - rate-limit
          - redirect
          - request-size-limit
          - request-transformer
          - response-transformer

  barbacane-middleware-config-valid:
    description: Middleware config must validate against the plugin's JSON Schema.
    documentationUrl: https://docs.barbacane.dev/guide/middlewares/
    severity: error
    given: "$['x-barbacane-middlewares'][*]"
    then:
      function: barbacane-validate-middleware-config

  # Note: no duplicate-name rule. Middlewares are intentionally stackable —
  # `cel` (routing rules), `rate-limit` (layered keys), `ai-token-limit`
  # (multi-window) all rely on appearing multiple times with different
  # configs. See docs/guide/middlewares/index.md#stacking.

  # Operation-level middleware rules (same checks)

  barbacane-op-middleware-has-name:
    description: Each operation-level middleware entry must include a "name" field.
    documentationUrl: https://docs.barbacane.dev/reference/extensions.html#x-barbacane-middlewares
    severity: error
    given: "$.paths[*][*]['x-barbacane-middlewares'][*]"
    then:
      field: name
      function: truthy

  barbacane-op-middleware-known-plugin:
    description: Operation-level middleware name must be a known Barbacane middleware plugin.
    documentationUrl: https://docs.barbacane.dev/guide/middlewares/
    severity: warn
    given: "$.paths[*][*]['x-barbacane-middlewares'][*].name"
    then:
      function: enumeration
      functionOptions:
        values:
          - acl
          - ai-cost-tracker
          - ai-prompt-guard
          - ai-response-guard
          - ai-token-limit
          - apikey-auth
          - basic-auth
          - bot-detection
          - cache
          - cel
          - correlation-id
          - cors
          - http-log
          - ip-restriction
          - jwt-auth
          - oauth2-auth
          - observability
          - oidc-auth
          - opa-authz
          - rate-limit
          - redirect
          - request-size-limit
          - request-transformer
          - response-transformer

  barbacane-op-middleware-config-valid:
    description: Operation-level middleware config must validate against the plugin's JSON Schema.
    documentationUrl: https://docs.barbacane.dev/guide/middlewares/
    severity: error
    given: "$.paths[*][*]['x-barbacane-middlewares'][*]"
    then:
      function: barbacane-validate-middleware-config

  # ---------------------------------------------------------------------------
  # AI middleware regex validation (shift-left)
  # ---------------------------------------------------------------------------
  # Rust `regex` is close enough to JavaScript for the class of mistakes
  # operators actually write (unclosed brackets, stray quantifiers). Catches
  # these at lint time instead of at the first 500 from the gateway.

  barbacane-ai-regex-root:
    description: Regex patterns in ai-prompt-guard / ai-response-guard profiles must compile.
    documentationUrl: https://docs.barbacane.dev/guide/middlewares/ai-gateway.html
    severity: error
    given: "$['x-barbacane-middlewares'][*]"
    then:
      function: barbacane-validate-ai-regex

  barbacane-ai-regex-op:
    description: Regex patterns in operation-level ai-prompt-guard / ai-response-guard profiles must compile.
    documentationUrl: https://docs.barbacane.dev/guide/middlewares/ai-gateway.html
    severity: error
    given: "$.paths[*][*]['x-barbacane-middlewares'][*]"
    then:
      function: barbacane-validate-ai-regex

  # ---------------------------------------------------------------------------
  # MCP validation
  # ---------------------------------------------------------------------------

  barbacane-mcp-requires-operation-id:
    description: "MCP-enabled operations must have an operationId."
    documentationUrl: https://docs.barbacane.dev/guide/mcp.html
    severity: error
    given: "$.paths[*][*]"
    then:
      function: barbacane-mcp-requires-fields

  # ---------------------------------------------------------------------------
  # Extension hygiene
  # ---------------------------------------------------------------------------

  barbacane-no-unknown-extension:
    description: "Only x-barbacane-dispatch, x-barbacane-middlewares, and x-barbacane-mcp are recognized Barbacane extensions."
    documentationUrl: https://docs.barbacane.dev/reference/extensions.html
    severity: warn
    given: "$"
    then:
      function: barbacane-no-unknown-extensions

  # ---------------------------------------------------------------------------
  # Upstream & secrets
  # ---------------------------------------------------------------------------

  barbacane-no-plaintext-upstream:
    description: "Upstream URLs should use HTTPS/WSS; plaintext HTTP/WS is insecure."
    documentationUrl: https://docs.barbacane.dev/guide/dispatchers.html#http-upstream
    severity: warn
    given: "$.paths[*][*]['x-barbacane-dispatch']"
    then:
      function: barbacane-no-plaintext-upstream

  barbacane-secret-ref-format:
    description: "Secret references must use env://VAR_NAME or file:///path format."
    documentationUrl: https://docs.barbacane.dev/guide/secrets.html
    severity: error
    given: "$.paths[*][*]['x-barbacane-dispatch'].config"
    then:
      function: barbacane-valid-secret-refs

  barbacane-middleware-secret-ref-format:
    description: "Secret references in middleware config must use env://VAR_NAME or file:///path format."
    documentationUrl: https://docs.barbacane.dev/guide/secrets.html
    severity: error
    given: "$['x-barbacane-middlewares'][*].config"
    then:
      function: barbacane-valid-secret-refs

  # ---------------------------------------------------------------------------
  # Auth safety
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Path parameter validation (overrides built-in "path-params" rule)
  # ---------------------------------------------------------------------------

  # Disable Vacuum's built-in path-params rule — it rejects Barbacane's
  # {paramName+} wildcard catch-all syntax as invalid OpenAPI.
  path-params: off

  barbacane-valid-path-params:
    description: "Path parameters must match their template, including Barbacane's {param+} wildcard syntax."
    documentationUrl: https://docs.barbacane.dev/guide/spec-configuration.html#path-parameters
    severity: error
    given: "$.paths"
    then:
      function: barbacane-valid-path-params

  # ---------------------------------------------------------------------------
  # Auth safety
  # ---------------------------------------------------------------------------

  barbacane-auth-opt-out-explicit:
    description: "When global auth middleware is set, operations without it should explicitly opt out with x-barbacane-middlewares: []."
    documentationUrl: https://docs.barbacane.dev/guide/middlewares/
    severity: info
    given: "$"
    then:
      function: barbacane-auth-opt-out
