openapi: "3.0.3"
info:
  title: AI Proxy Dispatcher Test API
  version: "1.0.0"
  description: API for testing the ai-proxy dispatcher plugin

paths:
  /v1/chat/completions:
    post:
      summary: OpenAI-compatible chat completions endpoint (flat config)
      operationId: chatCompletionsFlat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      x-barbacane-dispatch:
        name: ai-proxy
        config:
          provider: ollama
          base_url: "http://localhost:11434"
          timeout: 30
          max_tokens: 512
      responses:
        "200":
          description: Chat completion response
          content:
            application/json:
              schema:
                type: object

  /ai/premium/chat/completions:
    post:
      summary: Chat completions via named target (targets map + default_target)
      operationId: chatCompletionsNamedTarget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      x-barbacane-dispatch:
        name: ai-proxy
        config:
          default_target: local
          targets:
            local:
              provider: ollama
              base_url: "http://localhost:11434"
            openai:
              provider: openai
              api_key: "sk-placeholder"
          timeout: 30
          max_tokens: 512
      responses:
        "200":
          description: Chat completion response
          content:
            application/json:
              schema:
                type: object

  /ai/routed/chat/completions:
    post:
      summary: Routes table — glob-based dynamic model routing (ADR-0030 §3)
      operationId: chatCompletionsRoutes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      x-barbacane-dispatch:
        name: ai-proxy
        config:
          routes:
            - pattern: "claude-*"
              provider: anthropic
              api_key: "sk-placeholder"
              deny: ["claude-opus-*"]
            - pattern: "gpt-*"
              provider: openai
              api_key: "sk-placeholder"
              allow: ["gpt-4o", "gpt-4o-mini"]
            - pattern: "*"
              provider: ollama
              base_url: "http://localhost:11434"
          timeout: 30
          max_tokens: 512
      responses:
        "200":
          description: Chat completion response
          content:
            application/json:
              schema:
                type: object

  /ai/restricted/chat/completions:
    post:
      summary: Named target with catalog deny — proves allow/deny on targets compiles
      operationId: chatCompletionsCatalogDeny
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      x-barbacane-dispatch:
        name: ai-proxy
        config:
          default_target: standard
          targets:
            standard:
              provider: anthropic
              api_key: "sk-placeholder"
              deny: ["claude-opus-*"]
          timeout: 30
          max_tokens: 512
      responses:
        "200":
          description: Chat completion response
          content:
            application/json:
              schema:
                type: object
