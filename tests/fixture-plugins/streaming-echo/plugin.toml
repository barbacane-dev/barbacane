[plugin]
name = "streaming-echo"
version = "0.1.0"
type = "dispatcher"
description = "Test fixture: proxies to upstream via host_http_stream (ADR-0023 integration tests)"
wasm = "streaming_echo.wasm"

[capabilities]
# host_http_stream (ADR-0023) is granted by the http_call capability, and the
# manifest reads the `host_functions` array (not `key = true` shorthand).
host_functions = ["http_call"]
