[plugin]
name = "ai-proxy"
version = "0.1.0"
type = "dispatcher"
description = "AI gateway dispatcher — routes to LLM providers (OpenAI, Anthropic, Ollama) with unified OpenAI-compatible API, provider fallback, and policy-driven routing via named targets"
wasm = "ai-proxy.wasm"

[capabilities]
host_functions = ["log", "context_get", "context_set", "http_call", "telemetry", "clock_now"]
